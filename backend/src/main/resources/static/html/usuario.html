<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ShadowBan - Mi cuenta</title>
        <link rel="stylesheet" href="../css/iniciarSesion.css" />
        <link rel="icon" type="image/png" href="../assets/favicon.png" />
    </head>

    <body>
        <header>
            <a href="inicio.html"
                ><img
                    src="../assets/logo_large_w_transparent.png"
                    alt="Logo de ShadowBan"
                    id="logo"
            /></a>
            <ul>
                <li>
                    <a href="contacto.html"
                        ><img
                            src="../assets/info.png"
                            alt="Contacto"
                            class="icono"
                    /></a>
                </li>
                <li>
                    <a href="carrito.html"

                            src="../assets/carrito.png"

                </li>

                            src="../assets/usuario.png"

                    /></a>

            </ul>
        </header>
        <main>
            <article id="miCuenta">
                <h2 id="saludo">Hola</h2>
                <button type="button" id="logoutButton">Cerrar sesión</button>

                id="logo"

        <div id="authPopup" class="popup-overlay popup-hidden">

                <button type="button" id="popupClose" class="popup-close">

                </button>
                <h3 id="authPopupTitle">Aviso</h3>
                <p id="authPopupMessage">Aquí irá el mensaje.</p>
            </div>
