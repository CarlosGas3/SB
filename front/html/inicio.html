<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowBan - Inicio</title>
    <link rel="stylesheet" href="../css/inicio.css">
</head>

<body>
    <header>
        <a href="inicio.html"><img src="../assets/logoPNGpurple.png" alt="Logo de ShadowBan" id="logo"></a>
        <ul>
            <li><a href="contacto.html"><img src="../assets/info.png" alt="Contacto" class="icono"></a></li>
            <li><a href="carrito.html"><img src="../assets/carrito.png" alt="Carrito" class="icono"></a></li>
            <li><a href="iniciarSesion.html"><img src="../assets/usuario.png" alt="Contacto" class="icono"></a></li>
        </ul>
    </header>
    <main>
        <script>
            async function loadProducts() {
                try {
                    const res = await fetch("../products.json");
                    const products = await res.json();
                    const container = document.getElementById("products");
                    container.innerHTML = "";

                    products.forEach(p => {
                        const div = document.createElement("div");
                        div.className = "product";
                        div.onclick = () => window.open(p.url, "_blank");

                        div.innerHTML = `
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>${p.price}</p>
            ${p.status ? `<p class="status">${p.status}</p>` : ""}
            <button>Comprar</button>`;
                        container.appendChild(div);
                    });
                } catch (error) {
                    console.error("Error cargando productos:", error);
                    document.getElementById("products").innerText = "Error cargando productos.";
                }
            }

            loadProducts();
        </script>
    </main>
    <footer>
        <img src="../assets/logoPNGpurple.png" alt="Logo de ShadowBan" id="logo">
        <p>&copy; 2025 ShadowBan | Todos los derechos reservados.</p>
    </footer>
</body>

</html>
